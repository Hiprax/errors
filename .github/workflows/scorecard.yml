name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: "30 6 * * 1"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Only publish to the public OpenSSF database from main / scheduled
          # runs; PR runs are gating-only so they don't pollute the score.
          publish_results: ${{ github.event_name != 'pull_request' }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # Code-scanning SARIF upload only runs on push/schedule. On PRs the
      # token does not have `security-events: write` for fork PRs and the
      # alert UI is meant to track main-branch state.
      - name: Upload to code-scanning
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7 # v4.35.3
        with:
          sarif_file: results.sarif
